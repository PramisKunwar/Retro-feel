<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Feel</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title-row">
                <span class="logo">▓▓</span>
                <h1>RETROFY WEB</h1>
            </div>
            <p class="version">v1.0.0--Terminal Mode</p>
        </div>
        <div class="divider">==============================</div>

        <div class="control-row">
            <span class="label">RETRO MODE</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleEnabled">
                <span class="slider"></span>
            </label>
        </div>

        <div class="divider-thin"> </div>
            <div class="section-label">DISPLAY THEME</div>
            <div class="theme-row">
                <button class="theme-btn amber" data-theme ="amber" title="Amber">
                    <span class="swatch"></span>
                    AMBER
                </button>
                <button class="theme-btn green" data-theme="green" title="Green">
                    <span class="swatch"></span>
                    GREEN
                </button>
                <button class="theme-btn white" data-theme="white" title="White">
                    <span class="swatch"></span>
                    WHITE
                </button>
            </div>

            <div class="divider-thin"></div>

            <div class="section-label">OPTIONS</div>

            <div class="control-row">
                <span class="label">CRT Flicker</span>
                <label class="toggle-switch small">
                    <input type="checkbox" id="toggleFlicker">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-row">
                <span class="label">Boot Sequence</span>
                <label class="toggle-switch small">
                    <input type="checkbox" id="toggleBoot">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="divider-thin"></div>

            <div class="control-row">
                <span class="label site-label" id="siteLabel">This site</span>
                <label class="toggle-switch small">
                    <input type="checkbox" id="toggleBoot">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="divider">===============================</div>

            <div class="footer">
                <span class="hint">Ctr+Shift+K -> Command Palette</span>
            </div>

    </div>

    <script src="popup.js"></script>
</body>

</html>


    <!--
    Think amber screens, pixel-style fonts, flat square UI, old terminal energy and 
    classic computer aesthetics that creates a nostalgic feel while still being great to use today.
     -->
